services:

  mysql:
    image: mysql:8.0
    container_name: carrental-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: car_rental
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - carrental-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./springboot-rentalapirest-backend
      dockerfile: Dockerfile
    container_name: carrental-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    networks:
      - carrental-net

  frontend:
    build:
      context: ./angular-rentalapirest-frontend
      dockerfile: Dockerfile
    container_name: carrental-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - carrental-net

volumes:
  mysql_data:

networks:
  carrental-net: